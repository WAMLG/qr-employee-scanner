<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  >

  <title>QR Lunch Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #1f2937;
      --text: #ffffff;
      --muted: #cbd5e1;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 12px;
    }

    .top-card,
    .scanner-card,
    .status-card {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    .top-card {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 14px;
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 6px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
      line-height: 1.4;
    }

    .device-pill {
      display: inline-flex;
      margin-top: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.16);
      color: #bae6fd;
      font-size: 13px;
      font-weight: 700;
    }

    .scanner-card {
      background: var(--card);
      padding: 12px;
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 14px;
      background: #020617;
    }

    #reader video {
      border-radius: 14px;
    }

    .status-card {
      background: var(--card2);
      padding: 16px;
      text-align: center;
      min-height: 150px;
      display: flex;

    .status-sub {
      color: var(--muted);

      white-space: pre-line;
    }

    .status-idle .status-main {
      color: var(--blue);
    }

    .status-processing .status-main {
      color: var(--yellow);
    }

    .status-success .status-main {
      color: var(--green);
    }

    .status-error .status-main {
      color: var(--red);
    }

    .button-row {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      border: none;
      border-radius: 14px;

      font-size: 16px;
      font-weight: 800;
      color: #ffffff;
      background: #2563eb;
      cursor: pointer;
    }

    button.secondary {
      background: #475569;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .footer {
      color: #94a3b8;
      text-align: center;
      font-size: 12px;
      padding-bottom: 8px;
    }

    @media (min-width: 700px) {
      .app {
        max-width: 520px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="top-card">
      <h1 id="pageTitle" class="title">QR Lunch Scanner</h1>

      <p id="pageDescription" class="sub">
        Scan the employee QR.
      </p>

      <div class="device-pill">
        Device:
        <span id="deviceLabel" style="margin-left: 6px;"></span>
      </div>
    </div>

    <div class="scanner-card">
      <div id="reader"></div>
    </div>

    <div id="statusCard" class="status-card status-idle">
      <div id="statusMain" class="status-main">Ready</div>

      <div id="statusSub" class="status-sub">
        Tap Start Camera and scan the employee QR.
      </div>
    </div>

    <div class="button-row">
      <button id="startBtn" onclick="startScanner()">
        Start Camera
      </button>

      <button
        id="stopBtn"
        class="secondary"
        onclick="stopScanner()"
        disabled
      >
        Stop
      </button>
    </div>

    <div class="footer">
      QR Lunch Management System
      <br>
      Server time shown after each scan
    </div>

  </div>

  <script>
    /*
     * Apps Script backend deployment URL.
     */
    const BACKEND_URL =
      "https://script.google.com/macros/s/AKfycbz0Vbx-a7tijTMiSoRJFveiPfIUZvHULf2Iy5dx7Sq2Zww5iHSpQaLKH69DOntdCinu/exec";

    /*
     * URL settings.
     *
     * mode=request → lunch request scanner
     * mode=lunch   → lunch room scanner
     */
    const urlParams = new URLSearchParams(window.location.search);

    const requestedMode =
      (urlParams.get("mode") || "request").toLowerCase();

    const MODE =
      requestedMode === "lunch"
        ? "lunch"
        : "request";

    const DEVICE_ID =
      urlParams.get("device_id") || "";

    const TOKEN =
      urlParams.get("token") || "";

    /*
     * Apps Script API route used by each scanner mode.
     */
    const API_NAME =
      MODE === "lunch"
        ? "lunchScan"
        : "lunchRequest";

    /*
     * Text displayed for each scanner.
     */
    const PAGE_CONFIG = {
      request: {
        title: "Lunch Request Scanner",

        description:
          "Scan the employee QR before 10:00 AM to request company lunch for today.",

        readyText:
          "Tap Start Camera and scan the employee QR.",

        scanningText:
          "Camera is active. Scan the next lunch request."
      },

      lunch: {
        title: "Lunch Room Scanner",

        description:
          "Scan employee QR cards when entering and leaving the lunch room.",

        readyText:
          "Tap Start Camera and scan the employee QR.",

        scanningText:
          "Camera is active. Scan for lunch room IN or OUT."
      }
    };

    const CURRENT_PAGE =
      PAGE_CONFIG[MODE] || PAGE_CONFIG.request;

    let html5QrCode = null;
    let scannerRunning = false;
    let processing = false;

    let lastLocalCode = "";
    let lastLocalTime = 0;

    /*
     * Set page details.
     */
    document.getElementById("deviceLabel").innerText =
      DEVICE_ID || "Missing";

    document.getElementById("pageTitle").innerText =
      CURRENT_PAGE.title;

    document.getElementById("pageDescription").innerText =
      CURRENT_PAGE.description;

    document.title = CURRENT_PAGE.title;

    /*
     * Initial page validation.
     */
    window.addEventListener("load", function () {
      if (
        !BACKEND_URL ||
        BACKEND_URL.includes("PASTE_YOUR")
      ) {
        setStatus(
          "error",
          "Backend Missing",
          "Please set the Apps Script backend URL in index.html."
        );

        document.getElementById("startBtn").disabled = true;
        return;
      }

      if (!DEVICE_ID || !TOKEN) {
        setStatus(
          "error",
          "Device Info Missing",
          "Open this page with device_id and token in the URL."
        );

        document.getElementById("startBtn").disabled = true;
        return;
      }

      setStatus(
        "idle",
        "Ready",
        CURRENT_PAGE.readyText
      );
    });

    /*
     * Start the camera scanner.
     */
    function startScanner() {
      if (scannerRunning || processing) return;

      if (!window.Html5Qrcode) {
        setStatus(
          "error",
          "Scanner Library Error",
          "QR scanner library did not load. Check the internet connection."
        );

        return;
      }

      html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 10,

        qrbox: function (
          viewfinderWidth,
          viewfinderHeight
        ) {
          const minEdge = Math.min(
            viewfinderWidth,
            viewfinderHeight
          );

          const size = Math.floor(minEdge * 0.72);

          return {
            width: size,
            height: size
          };
        },

        aspectRatio: 1.0
      };

      html5QrCode.start(
        {
          facingMode: "environment"
        },

        config,

        onQrSuccess,

        function () {
          // Ignore frequent frame-level scan errors.
        }

      ).then(function () {
        scannerRunning = true;

        document.getElementById("startBtn").disabled = true;
        document.getElementById("stopBtn").disabled = false;

        setStatus(
          "idle",
          "Scanning",
          CURRENT_PAGE.scanningText
        );

      }).catch(function (error) {
        scannerRunning = false;

        document.getElementById("startBtn").disabled = false;
        document.getElementById("stopBtn").disabled = true;

        setStatus(
          "error",
          "Camera Error",
          "Could not start camera.\n" +
          "Allow camera permission and try again.\n\n" +
          String(error)
        );
      });
    }

    /*
     * Stop the camera scanner.
     */
    function stopScanner() {
      if (!html5QrCode || !scannerRunning) return;

      html5QrCode.stop()
        .then(function () {
          scannerRunning = false;

          document.getElementById("startBtn").disabled = false;
          document.getElementById("stopBtn").disabled = true;

          setStatus(
            "idle",
            "Stopped",
            "Tap Start Camera to scan again."
          );
        })
        .catch(function () {
          scannerRunning = false;

          document.getElementById("startBtn").disabled = false;
          document.getElementById("stopBtn").disabled = true;

          setStatus(
            "idle",
            "Stopped",
            "Tap Start Camera to scan again."
          );
        });
    }

    /*
     * Called when a QR code is detected.
     */
    function onQrSuccess(decodedText) {
      const qrText =
        String(decodedText || "").trim();

      if (!qrText) return;

      const now = Date.now();

      /*
       * Local duplicate protection.
       * Server-side duplicate protection still applies.
       */
      if (
        qrText === lastLocalCode &&
        now - lastLocalTime < 3000
      ) {
        return;
      }

      if (processing) return;

      lastLocalCode = qrText;
      lastLocalTime = now;
      processing = true;

      setStatus(
        "processing",
        "Processing",
        "Scanned: " + qrText +
        "\nSending to server..."
      );

      sendScan(qrText);
    }

    /*
     * Send the scanned employee ID to Apps Script using JSONP.
     */
    function sendScan(qrText) {
      const callbackName =
        "qrCallback_" +
        Date.now() +
        "_" +
        Math.floor(Math.random() * 100000);

      const script =
        document.createElement("script");

      let requestCompleted = false;

      const timeoutId = setTimeout(function () {
        if (requestCompleted) return;

        requestCompleted = true;
        processing = false;

        delete window[callbackName];

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }

        setStatus(
          "error",
          "Network Timeout",
          "The server did not respond. Check the connection and try again."
        );

        resetToScanningSoon();
      }, 15000);

      window[callbackName] = function (response) {
        if (requestCompleted) return;

        requestCompleted = true;
        clearTimeout(timeoutId);

        delete window[callbackName];

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }

        handleServerResponse(response);
      };

      const apiUrl =
        BACKEND_URL +
        "?api=" + encodeURIComponent(API_NAME) +
        "&callback=" + encodeURIComponent(callbackName) +
        "&device_id=" + encodeURIComponent(DEVICE_ID) +
        "&token=" + encodeURIComponent(TOKEN) +
        "&qr_payload=" + encodeURIComponent(qrText) +
        "&client_time=" +
          encodeURIComponent(new Date().toISOString());

      script.src = apiUrl;

      script.onerror = function () {
        if (requestCompleted) return;

        requestCompleted = true;
        clearTimeout(timeoutId);
        processing = false;

        delete window[callbackName];

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }

        setStatus(
          "error",
          "Network Error",
          "Could not contact the Apps Script backend."
        );

        resetToScanningSoon();
      };

      document.body.appendChild(script);
    }

    /*
     * Handle Apps Script response.
     */
    function handleServerResponse(response) {
      processing = false;

      if (!response) {
        setStatus(
          "error",
          "No Response",
          "No response was received from the server."
        );

        resetToScanningSoon();
        return;
      }

      /*
       * New lunch request accepted.
       */
      if (
        response.success &&
        response.code === "REQUEST_ACCEPTED"
      ) {
        vibrateSuccess();

        const data = response.data || {};

        const categoryTitle =
          data.category === "REGULAR"
            ? "Regular Lunch Requested"
            : "Extra Lunch Requested";

        setStatus(
          "success",
          categoryTitle,

          response.message +

          "\nID: " +
          (data.employee_id || "") +

          "\nDepartment: " +
          (data.department || "") +

          "\nCategory: " +
          (data.category || "") +

          "\nRequest Time: " +
          (data.request_time || "") +

          "\nRegular Orders: " +
          (data.regular_orders || 0) +

          "\nExtra Orders: " +
          (data.extra_orders || 0) +

          "\nMonthly Non-Requests: " +
          (data.monthly_non_requests || 0) +

          "\nFinal Lunch Count: " +
          (data.final_lunch_count || 0) +

          "\nServer: " +
          response.server_time
        );

        resetToScanningSoon();
        return;
      }

      /*
       * Employee already requested lunch today.
       */
      if (
        response.success &&
        response.code === "ALREADY_REQUESTED"
      ) {
        vibrateWarning();

        const data = response.data || {};

        setStatus(
          "processing",
          "Already Requested",

          response.message +

          "\nID: " +
          (data.employee_id || "") +

          "\nCategory: " +
          (data.category || "") +

          "\nRegular Orders: " +
          (data.regular_orders || 0) +

          "\nExtra Orders: " +
          (data.extra_orders || 0) +

          "\nFinal Lunch Count: " +
          (data.final_lunch_count || 0) +

          "\nServer: " +
          response.server_time
        );

        resetToScanningSoon();
        return;
      }

      /*
       * Lunch-room entry accepted.
       */
      if (
        response.success &&
        response.code === "LUNCH_ENTRY"
      ) {
        vibrateSuccess();

        const data = response.data || {};

        setStatus(
          "success",
          "Lunch Room IN",

          response.message +

          "\nID: " +
          (data.employee_id || "") +

          "\nDepartment: " +
          (data.department || "") +

          "\nEntry: " +
          (data.lunch_entry_time || "") +

          "\nRequest: " +
          (data.request_status || "NOT_REQUESTED") +

          "\nCategory: " +
          (data.request_category || "NONE") +

          "\nServer: " +
          response.server_time
        );

        resetToScanningSoon();
        return;
      }

      /*
       * Lunch-room exit accepted.
       */
      if (
        response.success &&
        response.code === "LUNCH_EXIT"
      ) {
        vibrateSuccess();

        const data = response.data || {};

        setStatus(
          "success",
          "Lunch Room OUT",

          response.message +

          "\nID: " +
          (data.employee_id || "") +

          "\nDepartment: " +
          (data.department || "") +

          "\nEntry: " +
          (data.lunch_entry_time || "") +

          "\nExit: " +
          (data.lunch_exit_time || "") +

          "\nDuration: " +
          (data.lunch_duration_minutes || 0) +
          " minutes" +

          "\nServer: " +
          response.server_time
        );

        resetToScanningSoon();
        return;
      }

      /*
       * Duplicate lunch-room scan.
       */
      if (
        response.success &&
        response.code === "DUPLICATE"
      ) {
        vibrateWarning();

        setStatus(
          "processing",
          "Duplicate Ignored",

          response.message +

          "\nServer: " +
          response.server_time
        );

        resetToScanningSoon();
        return;
      }

      /*
       * Generic successful response fallback.
       */
      if (response.success) {
        vibrateSuccess();

        setStatus(
          "success",
          "Completed",

          response.message +

          "\nServer: " +
          response.server_time
        );

        resetToScanningSoon();
        return;
      }

      /*
       * Rejected request or system error.
       */
      vibrateError();

      let rejectionTitle = "Rejected";

      if (response.code === "REQUEST_CLOSED") {
        rejectionTitle = "Request Time Closed";
      } else if (
        response.code === "LUNCH_ALREADY_COMPLETED"
      ) {
        rejectionTitle = "Already Completed";
      } else if (
        response.code === "EMPLOYEE_NOT_FOUND"
      ) {
        rejectionTitle = "Employee Not Found";
      }

      setStatus(
        "error",
        rejectionTitle,

        response.message +

        "\nCode: " +
        (response.code || "UNKNOWN_ERROR") +

        "\nServer: " +
        (response.server_time || "")
      );

      resetToScanningSoon();
    }

    /*
     * Return to scanning message after showing a result.
     */
    function resetToScanningSoon() {
      setTimeout(function () {
        setStatus(
          "idle",
          "Scanning",
          CURRENT_PAGE.scanningText
        );
      }, 2200);
    }

    /*
     * Update the status card.
     */
    function setStatus(type, main, sub) {
      const card =
        document.getElementById("statusCard");

      card.className =
        "status-card status-" + type;

      document.getElementById("statusMain").innerText =
        main;

      document.getElementById("statusSub").innerText =
        sub || "";
    }

    function vibrateSuccess() {
      if (navigator.vibrate) {
        navigator.vibrate([80]);
      }
    }

    function vibrateWarning() {
      if (navigator.vibrate) {
        navigator.vibrate([80, 60, 80]);
      }
    }

    function vibrateError() {
      if (navigator.vibrate) {
        navigator.vibrate([180, 80, 180]);
      }
    }
  </script>
</body>
</html>
