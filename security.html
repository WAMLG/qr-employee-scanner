<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Phone Handover</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #1f2937;
      --text: #ffffff;
      --muted: #cbd5e1;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #38bdf8;
      --orange: #f97316;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    .top-card {
      background: linear-gradient(135deg, #1e293b, #0f172a);
    }

    .title {
      font-size: 24px;
      font-weight: 900;
      margin: 0 0 6px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
      line-height: 1.4;
    }

    .device-pill {
      display: inline-flex;
      margin-top: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.16);
      color: #bae6fd;
      font-size: 13px;
      font-weight: 700;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.16);
      background: #020617;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 12px;
      font-size: 16px;
      outline: none;
    }

    .employee-list {
      margin-top: 10px;
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .employee-item {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.12);
      background: #1f2937;
      color: #ffffff;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
    }

    .employee-item strong {
      display: block;
      font-size: 15px;
      margin-bottom: 3px;
    }

    .employee-item span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .selected-card {
      background: var(--card2);
    }

    .selected-name {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .selected-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .status-badge {
      display: inline-flex;
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      background: rgba(56, 189, 248, 0.16);
      color: #bae6fd;
    }

    .status-with {
      background: rgba(34, 197, 94, 0.16);
      color: #bbf7d0;
    }

    .status-returned {
      background: rgba(249, 115, 22, 0.16);
      color: #fed7aa;
    }

    .action-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 18px 12px;
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      margin-top: 14px;
      cursor: pointer;
    }

    .submit-btn {
      background: var(--green);
    }

    .return-btn {
      background: var(--orange);
    }

    .action-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .message {
      background: var(--card2);
      border-radius: 16px;
      padding: 14px;
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-line;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .message.success {
      border-color: rgba(34,197,94,0.45);
      color: #bbf7d0;
    }

    .message.error {
      border-color: rgba(239,68,68,0.45);
      color: #fecaca;
    }

    .message.info {
      border-color: rgba(56,189,248,0.35);
      color: #bae6fd;
    }

    .small-row {
      display: flex;
      gap: 10px;
    }

    .small-btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 13px;
      font-size: 15px;
      font-weight: 800;
      color: #ffffff;
      background: #475569;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    @media (min-width: 700px) {
      .app {
        max-width: 560px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="card top-card">
      <h1 class="title">Phone Handover</h1>
      <p class="sub">
        Search the employee, select the name, then submit or return the phone.
      </p>
      <div class="device-pill">
        Device: <span id="deviceLabel" style="margin-left:6px;"></span>
      </div>
    </div>

    <div id="messageBox" class="message info">
      Loading employees...
    </div>

    <div class="card">
      <label for="searchInput">Search by employee name or ID</label>
      <input id="searchInput" type="text" placeholder="Type name or employee ID..." oninput="renderEmployeeList()">

      <div id="employeeList" class="employee-list"></div>
    </div>

    <div id="selectedCard" class="card selected-card hidden">
      <div id="selectedName" class="selected-name"></div>
      <div id="selectedMeta" class="selected-meta"></div>
      <div id="selectedStatus" class="status-badge"></div>

      <button id="actionButton" class="action-btn" onclick="submitPhoneAction()"></button>
    </div>

    <div class="small-row">
      <button class="small-btn" onclick="loadEmployees()">Refresh</button>
      <button class="small-btn" onclick="clearSelection()">Clear</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbz0Vbx-a7tijTMiSoRJFveiPfIUZvHULf2Iy5dx7Sq2Zww5iHSpQaLKH69DOntdCinu/exec";

    const urlParams = new URLSearchParams(window.location.search);
    const DEVICE_ID = urlParams.get("device_id") || "";
    const TOKEN = urlParams.get("token") || "";

    let employees = [];
    let selectedEmployee = null;
    let processing = false;

    document.getElementById("deviceLabel").innerText = DEVICE_ID || "Missing";

    window.addEventListener("load", function () {
      if (!BACKEND_URL || BACKEND_URL.includes("PASTE_YOUR")) {
        showMessage("Backend URL is missing in security.html.", "error");
        return;
      }

      if (!DEVICE_ID || !TOKEN) {
        showMessage("Open this page with device_id and token in the URL.", "error");
        return;
      }

      loadEmployees();
    });

    function callApi(apiName, params, callback) {
      const callbackName = "securityCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
      const script = document.createElement("script");

      window[callbackName] = function(response) {
        delete window[callbackName];

        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }

        callback(response);
      };

      const query = new URLSearchParams({
        api: apiName,
        callback: callbackName,
        device_id: DEVICE_ID,
        token: TOKEN,
        client_time: new Date().toISOString()
      });

      Object.keys(params || {}).forEach(function(key) {
        query.set(key, params[key]);
      });

      script.src = BACKEND_URL + "?" + query.toString();

      script.onerror = function() {
        delete window[callbackName];
        showMessage("Network error. Could not contact Apps Script backend.", "error");
      };

      document.body.appendChild(script);
    }

    function loadEmployees() {
      showMessage("Loading employees...", "info");

      callApi("phoneEmployees", {}, function(response) {
        if (!response || !response.success) {
          showMessage(response ? response.message : "Could not load employees.", "error");
          return;
        }

        employees = (response.data && response.data.employees) ? response.data.employees : [];

        renderEmployeeList();

        if (employees.length === 0) {
          showMessage("No active phone-required employees found.", "info");
        } else {
          showMessage("Employees loaded: " + employees.length, "success");
        }

        if (selectedEmployee) {
          const updated = employees.find(e => e.employee_id === selectedEmployee.employee_id);
          if (updated) {
            selectEmployee(updated.employee_id);
          } else {
            clearSelection();
          }
        }
      });
    }

    function renderEmployeeList() {
      const list = document.getElementById("employeeList");
      const search = document.getElementById("searchInput").value.trim().toLowerCase();

      list.innerHTML = "";

      const filtered = employees.filter(function(emp) {
        const text = (
          emp.employee_id + " " +
          emp.full_name + " " +
          emp.department + " " +
          emp.current_status
        ).toLowerCase();

        return text.includes(search);
      }).slice(0, 30);

      if (filtered.length === 0) {
        list.innerHTML = '<div class="message info">No matching employees.</div>';
        return;
      }

      filtered.forEach(function(emp) {
        const btn = document.createElement("button");
        btn.className = "employee-item";
        btn.onclick = function() {
          selectEmployee(emp.employee_id);
        };

        btn.innerHTML =
          "<strong>" + escapeHtml(emp.full_name) + "</strong>" +
          "<span>" + escapeHtml(emp.employee_id) + " • " + escapeHtml(emp.department || "-") + "</span>" +
          "<span>Status: " + escapeHtml(emp.current_status) + "</span>";

        list.appendChild(btn);
      });
    }

    function selectEmployee(employeeId) {
      selectedEmployee = employees.find(function(emp) {
        return emp.employee_id === employeeId;
      });

      if (!selectedEmployee) {
        clearSelection();
        return;
      }

      document.getElementById("selectedCard").classList.remove("hidden");

      document.getElementById("selectedName").innerText = selectedEmployee.full_name;

      document.getElementById("selectedMeta").innerText =
        "ID: " + selectedEmployee.employee_id +
        "\nDepartment: " + (selectedEmployee.department || "-") +
        "\nDesignation: " + (selectedEmployee.designation || "-") +
        "\nLast action: " + (selectedEmployee.last_action_time || "-");

      const statusEl = document.getElementById("selectedStatus");
      statusEl.innerText = "Current Status: " + selectedEmployee.current_status;
      statusEl.className = "status-badge";

      const actionButton = document.getElementById("actionButton");

      if (selectedEmployee.current_status === "WITH_SECURITY") {
        statusEl.classList.add("status-with");
        actionButton.innerText = "Phone Returned";
        actionButton.className = "action-btn return-btn";
      } else {
        statusEl.classList.add("status-returned");
        actionButton.innerText = "Phone Submitted";
        actionButton.className = "action-btn submit-btn";
      }
    }

    function submitPhoneAction() {
      if (!selectedEmployee || processing) return;

      const action = selectedEmployee.current_status === "WITH_SECURITY"
        ? "RETURNED"
        : "HANDED_OVER";

      processing = true;
      document.getElementById("actionButton").disabled = true;

      showMessage("Updating phone status...", "info");

      callApi("phoneEvent", {
        employee_id: selectedEmployee.employee_id,
        action: action
      }, function(response) {
        processing = false;
        document.getElementById("actionButton").disabled = false;

        if (!response || !response.success) {
          showMessage(response ? response.message : "Update failed.", "error");
          return;
        }

        showMessage(response.message + "\nServer: " + response.server_time, "success");

        vibrateSuccess();

        loadEmployees();
      });
    }

    function clearSelection() {
      selectedEmployee = null;
      document.getElementById("selectedCard").classList.add("hidden");
      document.getElementById("searchInput").value = "";
      renderEmployeeList();
    }

    function showMessage(text, type) {
      const box = document.getElementById("messageBox");
      box.className = "message " + (type || "info");
      box.innerText = text;
    }

    function vibrateSuccess() {
      if (navigator.vibrate) navigator.vibrate([80]);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
