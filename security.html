<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Phone Handover</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #1f2937;
      --text: #ffffff;
      --muted: #cbd5e1;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #38bdf8;
      --orange: #f97316;
      --border: rgba(255,255,255,0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      height: 100dvh;
    }

    .app {
      height: 100dvh;
      max-width: 520px;
      margin: 0 auto;
      padding: 10px;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 8px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.28);
    }

    .top-card {
      background: linear-gradient(135deg, #1e293b, #0f172a);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      margin: 0;
      line-height: 1.1;
    }

    .device {
      font-size: 11px;
      color: #bae6fd;
      background: rgba(56, 189, 248, 0.14);
      padding: 5px 8px;
      border-radius: 999px;
      white-space: nowrap;
      font-weight: 700;
    }

    .kpis {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .kpi {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }

    .kpi-number {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .search-wrap {
      position: relative;
      z-index: 10;
    }

    .search-input {
      width: 100%;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 12px;
      font-size: 17px;
      font-weight: 700;
      outline: none;
    }

    .search-input::placeholder {
      color: #64748b;
      font-weight: 600;
    }

    .dropdown {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      max-height: 230px;
      overflow-y: auto;
      box-shadow: 0 14px 32px rgba(0,0,0,0.45);
    }

    .dropdown.show {
      display: block;
    }

    .option {
      width: 100%;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: #020617;
      color: #ffffff;
      text-align: left;
      padding: 10px 12px;
      cursor: pointer;
    }

    .option:last-child {
      border-bottom: none;
    }

    .option:active {
      background: #1e293b;
    }

    .option-name {
      display: block;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.25;
    }

    .option-meta {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.25;
    }

    .selected-card {
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--card2);
    }

    .empty-selected {
      color: #94a3b8;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    .emp-name {
      font-size: 21px;
      font-weight: 900;
      margin-bottom: 6px;
      line-height: 1.15;
    }

    .emp-details {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .status-pill {
      display: inline-flex;
      align-self: flex-start;
      margin-top: 8px;
      padding: 7px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .with-security {
      background: rgba(34, 197, 94, 0.15);
      color: #bbf7d0;
    }

    .not-submitted {
      background: rgba(249, 115, 22, 0.16);
      color: #fed7aa;
    }

    .action-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px 12px;
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      cursor: pointer;
      min-height: 58px;
    }

    .submit-btn {
      background: var(--green);
    }

    .return-btn {
      background: var(--orange);
    }

    .action-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .small-btn {
      border: none;
      border-radius: 14px;
      padding: 11px;
      font-size: 14px;
      font-weight: 800;
      color: #ffffff;
      background: #475569;
      cursor: pointer;
    }

    .msg {
      font-size: 12px;
      color: #bae6fd;
      text-align: center;
      min-height: 18px;
      line-height: 1.35;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .msg.error {
      color: #fecaca;
    }

    .msg.success {
      color: #bbf7d0;
    }

    .hidden {
      display: none;
    }

    @media (max-height: 650px) {
      .app {
        gap: 6px;
        padding: 8px;
      }

      .card {
        padding: 8px;
        border-radius: 14px;
      }

      .title {
        font-size: 20px;
      }

      .kpi-number {
        font-size: 22px;
      }

      .search-input {
        padding: 12px;
        font-size: 16px;
      }

      .emp-name {
        font-size: 19px;
      }

      .action-btn {
        min-height: 52px;
        padding: 13px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="card top-card">
      <div class="title-row">
        <h1 class="title">Phone Handover</h1>
        <div class="device" id="deviceLabel">Device</div>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi">
        <div id="handedCount" class="kpi-number">0</div>
        <div class="kpi-label">Handed Phones</div>
      </div>

      <div class="kpi">
        <div id="toHandoverCount" class="kpi-number">0</div>
        <div class="kpi-label">To Handover</div>
      </div>
    </div>

    <div class="search-wrap">
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="Search name or ID..."
        autocomplete="off"
        onfocus="showDropdown()"
        onclick="showDropdown()"
        oninput="renderDropdown()"
      >

      <div id="dropdown" class="dropdown"></div>
    </div>

    <div id="selectedCard" class="card selected-card">
      <div id="emptyState" class="empty-selected">
        Select an employee to update phone status.
      </div>

      <div id="employeeDetails" class="hidden">
        <div id="empName" class="emp-name"></div>
        <div id="empDetails" class="emp-details"></div>
        <div id="empStatus" class="status-pill"></div>
      </div>
    </div>

    <div>
      <button id="actionButton" class="action-btn submit-btn" onclick="submitPhoneAction()" disabled>
        Select Employee
      </button>

      <div class="bottom-row" style="margin-top:8px;">
        <button class="small-btn" onclick="loadEmployees()">Refresh</button>
        <button class="small-btn" onclick="clearSelection()">Clear</button>
      </div>

      <div id="messageBox" class="msg">Loading employees...</div>
    </div>

  </div>

  <script>
    // Use the same Apps Script backend URL used by your GitHub scanner page.
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbz0Vbx-a7tijTMiSoRJFveiPfIUZvHULf2Iy5dx7Sq2Zww5iHSpQaLKH69DOntdCinu/exec";

    const urlParams = new URLSearchParams(window.location.search);
    const DEVICE_ID = urlParams.get("device_id") || "";
    const TOKEN = urlParams.get("token") || "";

    let employees = [];
    let selectedEmployee = null;
    let processing = false;

    document.getElementById("deviceLabel").innerText = DEVICE_ID || "Missing";

    window.addEventListener("load", function () {
      if (!BACKEND_URL || BACKEND_URL.includes("PASTE_YOUR")) {
        showMessage("Backend URL missing.", "error");
        return;
      }

      if (!DEVICE_ID || !TOKEN) {
        showMessage("Device ID or token missing in URL.", "error");
        return;
      }

      loadEmployees();
    });

    document.addEventListener("click", function (event) {
      const searchWrap = document.querySelector(".search-wrap");
      if (!searchWrap.contains(event.target)) {
        hideDropdown();
      }
    });

    function callApi(apiName, params, callback) {
      const callbackName = "securityCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
      const script = document.createElement("script");

      window[callbackName] = function(response) {
        delete window[callbackName];

        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }

        callback(response);
      };

      const query = new URLSearchParams({
        api: apiName,
        callback: callbackName,
        device_id: DEVICE_ID,
        token: TOKEN,
        client_time: new Date().toISOString()
      });

      Object.keys(params || {}).forEach(function(key) {
        query.set(key, params[key]);
      });

      script.src = BACKEND_URL + "?" + query.toString();

      script.onerror = function() {
        delete window[callbackName];
        showMessage("Network error.", "error");
      };

      document.body.appendChild(script);
    }

    function loadEmployees() {
      showMessage("Loading employees...", "");

      callApi("phoneEmployees", {}, function(response) {
        if (!response || !response.success) {
          showMessage(response ? response.message : "Could not load employees.", "error");
          return;
        }

        employees = (response.data && response.data.employees) ? response.data.employees : [];

        updateKpis();
        renderDropdown();

        if (employees.length === 0) {
          showMessage("No phone-required employees.", "");
        } else {
          showMessage("Employees loaded.", "success");
        }

        if (selectedEmployee) {
          const updated = employees.find(function(emp) {
            return emp.employee_id === selectedEmployee.employee_id;
          });

          if (updated) {
            selectEmployee(updated.employee_id, false);
          } else {
            clearSelection();
          }
        }
      });
    }

    function updateKpis() {
      const handed = employees.filter(function(emp) {
        return emp.current_status === "WITH_SECURITY";
      }).length;

      const toHandover = employees.length - handed;

      document.getElementById("handedCount").innerText = handed;
      document.getElementById("toHandoverCount").innerText = toHandover;
    }

    function showDropdown() {
      renderDropdown();
      document.getElementById("dropdown").classList.add("show");
    }

    function hideDropdown() {
      document.getElementById("dropdown").classList.remove("show");
    }

    function renderDropdown() {
      const dropdown = document.getElementById("dropdown");
      const search = document.getElementById("searchInput").value.trim().toLowerCase();

      dropdown.innerHTML = "";

      let filtered = employees.filter(function(emp) {
        const text = (
          emp.employee_id + " " +
          emp.full_name + " " +
          emp.department
        ).toLowerCase();

        return text.includes(search);
      });

      filtered = filtered.slice(0, 12);

      if (filtered.length === 0) {
        const empty = document.createElement("button");
        empty.className = "option";
        empty.type = "button";
        empty.innerHTML =
          '<span class="option-name">No matching employees</span>' +
          '<span class="option-meta">Try another name or ID</span>';
        dropdown.appendChild(empty);
        return;
      }

      filtered.forEach(function(emp) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option";

        btn.onmousedown = function(event) {
          event.preventDefault();
          selectEmployee(emp.employee_id, true);
        };

        btn.innerHTML =
          '<span class="option-name">' + escapeHtml(emp.full_name) + '</span>' +
          '<span class="option-meta">' +
            escapeHtml(emp.employee_id) +
            ' • ' +
            escapeHtml(emp.department || "-") +
            ' • ' +
            escapeHtml(formatStatusText(emp.current_status)) +
          '</span>';

        dropdown.appendChild(btn);
      });
    }

    function selectEmployee(employeeId, hideList) {
      selectedEmployee = employees.find(function(emp) {
        return emp.employee_id === employeeId;
      });

      if (!selectedEmployee) {
        clearSelection();
        return;
      }

      document.getElementById("searchInput").value =
        selectedEmployee.full_name + " (" + selectedEmployee.employee_id + ")";

      document.getElementById("emptyState").classList.add("hidden");
      document.getElementById("employeeDetails").classList.remove("hidden");

      document.getElementById("empName").innerText = selectedEmployee.full_name;

      document.getElementById("empDetails").innerText =
        "Employee ID: " + selectedEmployee.employee_id +
        "\nDepartment: " + (selectedEmployee.department || "-") +
        "\nLast action: " + formatLastAction(selectedEmployee.current_status) +
        "\nTime: " + (selectedEmployee.last_action_time || "-");

      const statusEl = document.getElementById("empStatus");
      statusEl.innerText = "Current: " + formatStatusText(selectedEmployee.current_status);
      statusEl.className = "status-pill";

      const actionButton = document.getElementById("actionButton");
      actionButton.disabled = false;

      if (selectedEmployee.current_status === "WITH_SECURITY") {
        statusEl.classList.add("with-security");
        actionButton.innerText = "Phone Returned";
        actionButton.className = "action-btn return-btn";
      } else {
        statusEl.classList.add("not-submitted");
        actionButton.innerText = "Phone Submitted";
        actionButton.className = "action-btn submit-btn";
      }

      showMessage("", "");

      if (hideList) {
        hideDropdown();
      }
    }

    function submitPhoneAction() {
      if (!selectedEmployee || processing) return;

      const action = selectedEmployee.current_status === "WITH_SECURITY"
        ? "RETURNED"
        : "HANDED_OVER";

      processing = true;

      const actionButton = document.getElementById("actionButton");
      actionButton.disabled = true;
      actionButton.innerText = "Updating...";

      showMessage("Updating...", "");

      callApi("phoneEvent", {
        employee_id: selectedEmployee.employee_id,
        action: action
      }, function(response) {
        processing = false;

        if (!response || !response.success) {
          showMessage(response ? response.message : "Update failed.", "error");
          refreshSelectedButton();
          return;
        }

        showMessage(response.message, "success");
        vibrateSuccess();

        loadEmployees();
      });
    }

    function refreshSelectedButton() {
      if (!selectedEmployee) {
        document.getElementById("actionButton").disabled = true;
        document.getElementById("actionButton").innerText = "Select Employee";
        return;
      }

      selectEmployee(selectedEmployee.employee_id, false);
    }

    function clearSelection() {
      selectedEmployee = null;

      document.getElementById("searchInput").value = "";
      document.getElementById("emptyState").classList.remove("hidden");
      document.getElementById("employeeDetails").classList.add("hidden");

      const actionButton = document.getElementById("actionButton");
      actionButton.disabled = true;
      actionButton.innerText = "Select Employee";
      actionButton.className = "action-btn submit-btn";

      renderDropdown();
      hideDropdown();
      showMessage("", "");
    }

    function formatStatusText(status) {
      if (status === "WITH_SECURITY") return "With Security";
      if (status === "RETURNED") return "Returned";
      return "Not Submitted";
    }

    function formatLastAction(status) {
      if (status === "WITH_SECURITY") return "Phone Submitted";
      if (status === "RETURNED") return "Phone Returned";
      return "-";
    }

    function showMessage(text, type) {
      const box = document.getElementById("messageBox");
      box.className = "msg " + (type || "");
      box.innerText = text || "";
    }

    function vibrateSuccess() {
      if (navigator.vibrate) navigator.vibrate([80]);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
